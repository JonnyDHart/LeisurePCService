<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Staff Login — Leisure PC Service</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div class="admin-wrap">
    <div class="admin-card">
      <a href="../index.html" class="logo">Leisure <span>PC</span> Service</a>
      <p class="card-sub">Staff portal — authorized access only</p>

      <div class="admin-error" id="admin-error">Incorrect username or password.</div>

      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="admin" autocomplete="username" />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <button class="btn btn-primary form-submit" onclick="doLogin()">Log in</button>
      <p style="font-size: 12px; color: #aaa; text-align: center; margin-top: 16px;">Demo: use <strong>admin</strong> / <strong>leisure2025</strong></p>
    </div>
  </div>

  <script>
    function doLogin() {
      const user = document.getElementById('username').value;
      const pass = document.getElementById('password').value;
      if (user === 'admin' && pass === 'leisure2025') {
        sessionStorage.setItem('lpc_auth', '1');
        window.location.href = 'dashboard.html';
      } else {
        document.getElementById('admin-error').style.display = 'block';
      }
    }
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') doLogin();
    });
  </script>
</body>
</html>
