<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messages — Leisure PC Service</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="dash-layout">

  <header class="dash-header">
    <a href="../index.html" class="logo">Leisure <span>PC</span> Service</a>
    <nav>
      <a href="dashboard.html">Dashboard</a>
      <a href="messages.html" class="active">Messages <span style="background:#E1F5EE; color:#085041; font-size:11px; padding:2px 7px; border-radius:99px; margin-left:4px;" id="unread-badge">2</span></a>
    </nav>
    <a href="login.html" class="logout-btn" onclick="sessionStorage.removeItem('lpc_auth')">Log out</a>
  </header>

  <div class="msg-thread">
    <div class="msg-sidebar">
      <div class="msg-sidebar-header">Inbox</div>
      <div id="msg-list"></div>
    </div>
    <div class="msg-main" id="msg-main">
      <p style="color: var(--ink-muted); font-size: 15px; margin: auto;">Select a message to read it.</p>
    </div>
  </div>

  <script>
    if (!sessionStorage.getItem('lpc_auth')) window.location.href = 'login.html';

    const MESSAGES = [
      { id:1, name:'Dave K.', contact:'dave.k@gmail.com', time:'Today, 10:14am', subject:'Remote help today?', body:"Hey! Is it possible to get a remote help session today? My PC is running super slow and I have a work deadline. Happy to pay whatever. Let me know!", read: false },
      { id:2, name:'Linda M.', contact:'linda.m@hotmail.com', time:'Yesterday, 6:45pm', subject:"Laptop won't turn on", body:"Hi, my laptop completely stopped turning on after a Windows update last night. I'm a little panicked — I have important files on there. Do you do drop-offs? What would it cost?", read: false },
      { id:3, name:'Rob S.', contact:'rob.s@gmail.com', time:'Monday, 2:10pm', subject:'Thanks!', body:"Just wanted to say thanks again! The computer is running great now. Super happy with how quick and easy it was. Will definitely recommend you to my friends and family.", read: true },
      { id:4, name:'Carol W.', contact:'carol.w@yahoo.com', time:'Sunday, 11:30am', subject:'Printer question', body:"Hi there — before I book I just wanted to ask, do you help with printer setup? I have an HP OfficeJet that refuses to connect to my laptop. Windows 10.", read: true },
    ];

    let activeId = null;

    function renderList() {
      const list = document.getElementById('msg-list');
      list.innerHTML = MESSAGES.map(m => `
        <div class="msg-item-row ${activeId === m.id ? 'active' : ''}" onclick="openMsg(${m.id})">
          <div class="mi-name">
            ${!m.read ? '<span class="new-dot"></span>' : ''}
            ${m.name}
          </div>
          <div class="mi-preview">${m.subject}</div>
          <div class="mi-time">${m.time}</div>
        </div>
      `).join('');
      const unread = MESSAGES.filter(m => !m.read).length;
      const badge = document.getElementById('unread-badge');
      if (badge) badge.textContent = unread;
      badge.style.display = unread > 0 ? '' : 'none';
    }

    function openMsg(id) {
      const msg = MESSAGES.find(m => m.id === id);
      if (!msg) return;
      msg.read = true;
      activeId = id;
      renderList();

      document.getElementById('msg-main').innerHTML = `
        <h3>${msg.name}</h3>
        <div class="msg-meta">${msg.time} &middot; ${msg.contact}</div>
        <p style="font-size:13px; font-weight:500; color: var(--ink-muted); margin-bottom: 12px; text-transform:uppercase; letter-spacing:0.04em;">${msg.subject}</p>
        <div class="msg-bubble">${msg.body}</div>
        <div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:20px;">
          <a href="mailto:${msg.contact}?subject=Re: ${encodeURIComponent(msg.subject)}" class="btn btn-primary" style="font-size:14px; padding:10px 18px;">Reply via email</a>
          <button class="btn btn-ghost" style="font-size:14px; padding:10px 18px;" onclick="markHandled(${id})">Mark as handled</button>
        </div>
        <div class="msg-reply-bar">
          <input class="msg-reply-input" type="text" placeholder="Quick note to yourself about this message..." />
          <button class="btn btn-primary" style="padding:10px 16px; font-size:14px;">Save note</button>
        </div>
      `;
    }

    function markHandled(id) {
      const idx = MESSAGES.findIndex(m => m.id === id);
      if (idx > -1) {
        MESSAGES.splice(idx, 1);
        activeId = null;
        document.getElementById('msg-main').innerHTML = '<p style="color: var(--ink-muted); font-size: 15px; margin: auto;">Message marked as handled.</p>';
        renderList();
      }
    }

    renderList();
  </script>
</body>
</html>
