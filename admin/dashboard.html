<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Leisure PC Service</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="dash-layout">

  <header class="dash-header">
    <a href="../index.html" class="logo">Leisure <span>PC</span> Service</a>
    <nav>
      <a href="dashboard.html" class="active">Dashboard</a>
      <a href="messages.html">Messages <span id="msg-count" style="background:#E1F5EE; color:#085041; font-size:11px; padding:2px 7px; border-radius:99px; margin-left:4px;">2</span></a>
    </nav>
    <a href="login.html" class="logout-btn" onclick="sessionStorage.removeItem('lpc_auth')">Log out</a>
  </header>

  <div class="dash-body">
    <h2 class="dash-title">Dashboard</h2>
    <p class="dash-sub">Welcome back. Here's what's going on this week.</p>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="s-label">Open jobs</div>
        <div class="s-value">3</div>
      </div>
      <div class="stat-card">
        <div class="s-label">In progress</div>
        <div class="s-value">2</div>
      </div>
      <div class="stat-card">
        <div class="s-label">Completed this month</div>
        <div class="s-value">11</div>
      </div>
      <div class="stat-card">
        <div class="s-label">Revenue this month</div>
        <div class="s-value green">$840</div>
      </div>
    </div>

    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('open')">Open & in progress</button>
      <button class="tab-btn" onclick="switchTab('all')">All jobs</button>
    </div>

    <div class="dash-panel">
      <div class="panel-header">
        <h3>Job tracker</h3>
        <button class="panel-action" onclick="addJob()">+ Add job</button>
      </div>
      <div style="overflow-x: auto;">
        <table id="jobs-table">
          <thead>
            <tr>
              <th>Customer</th>
              <th>Issue</th>
              <th>Date</th>
              <th>Type</th>
              <th>Status</th>
              <th>Charge</th>
              <th>Notes</th>
            </tr>
          </thead>
          <tbody id="jobs-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    if (!sessionStorage.getItem('lpc_auth')) window.location.href = 'login.html';

    const JOBS = [
      { id:1, customer:'Dave K.', issue:'Slow PC', date:'Apr 8', type:'Remote', status:'open', charge:'$60', notes:'Contacted via site' },
      { id:2, customer:'Linda M.', issue:"Won't boot after update", date:'Apr 7', type:'Drop-off', status:'progress', charge:'$120', notes:'Left PC at front door' },
      { id:3, customer:'Sarah T.', issue:'Virus removal', date:'Apr 6', type:'On-site', status:'progress', charge:'$85', notes:'' },
      { id:4, customer:'Rob S.', issue:'Wi-Fi setup', date:'Apr 2', type:'On-site', status:'done', charge:'$60', notes:'Happy customer' },
      { id:5, customer:'Mike P.', issue:'Data transfer', date:'Mar 30', type:'Drop-off', status:'done', charge:'$65', notes:'' },
      { id:6, customer:'Tracy L.', issue:'Printer setup', date:'Mar 28', type:'On-site', status:'done', charge:'$60', notes:'' },
    ];

    let currentTab = 'open';

    function badgeHtml(status) {
      const map = { open: ['badge-open','Open'], progress: ['badge-progress','In progress'], done: ['badge-done','Done'] };
      const [cls, label] = map[status] || ['badge-open', status];
      return `<span class="badge ${cls}">${label}</span>`;
    }

    function renderJobs() {
      const filtered = currentTab === 'open' ? JOBS.filter(j => j.status !== 'done') : JOBS;
      const tbody = document.getElementById('jobs-body');
      tbody.innerHTML = filtered.map(j => `
        <tr>
          <td style="font-weight:500; color: var(--ink);">${j.customer}</td>
          <td>${j.issue}</td>
          <td>${j.date}</td>
          <td>${j.type}</td>
          <td>
            <select class="status-select" onchange="updateStatus(${j.id}, this.value)">
              <option value="open" ${j.status==='open'?'selected':''}>Open</option>
              <option value="progress" ${j.status==='progress'?'selected':''}>In progress</option>
              <option value="done" ${j.status==='done'?'selected':''}>Done</option>
            </select>
          </td>
          <td style="font-weight:500; color: var(--green-dark);">${j.charge}</td>
          <td style="color: var(--ink-muted); font-size:13px;">${j.notes || '—'}</td>
        </tr>
      `).join('');
    }

    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab-btn').forEach((b, i) => {
        b.classList.toggle('active', (tab === 'open' && i === 0) || (tab === 'all' && i === 1));
      });
      renderJobs();
    }

    function updateStatus(id, val) {
      const job = JOBS.find(j => j.id === id);
      if (job) { job.status = val; renderJobs(); }
    }

    function addJob() {
      const name = prompt('Customer name:');
      if (!name) return;
      const issue = prompt('Issue description:');
      JOBS.unshift({ id: Date.now(), customer: name, issue: issue || '—', date: 'Today', type: 'TBD', status: 'open', charge: '$—', notes: '' });
      renderJobs();
    }

    renderJobs();
  </script>
</body>
</html>
